<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forty Thieves Solitaire</title>

    <!-- Normalize CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" integrity="sha512-NhSC1YmyruXifcj/KFRWoC561YpHpc5Jtzgvbuzx5VozKpWvQ+4nXhPdFgmx8xqexRcpAglTj9sIBWINXa8x5w==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jomhuria&family=PT+Sans+Narrow:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- My Styles -->
    <link rel="stylesheet" href="styles.css?v=4.0">

    <script src="gsap/gsap.min.js" defer></script>
    <script type="module" src="js/main.js"></script>

</head>
<body>
    <div id="container">
        <div id="menuiconbg"></div>
        <img src="images/menu.svg" id="hamburgermenu" alt="menu icon">
        <nav id="menu" class="close">
            <ul>
                <li><a href="#" class="newgame action-bttn">new game</a></li>
                <li><a href="#" class="action-bttn" id="undo">undo move (-1 point)</a></li>
                <li id="stats">
                    <h3>game statistics</h3>
                    <p>Games Played: <span id="played">0</span></p>
                    <p>Your Average Score: <span id="average">0</span></p>
                    <p>Total wins (728 points): <span id="wins">0</span></p>
                </li>
                <li>
                    <a id="resetstats" class="action-bttn">reset your stats</a>
                    <p  id="reset">danger! reseting your statistics will erase all your game data!</p>
                </li>
            </ul>
        </nav>
        <main>
            <h1><img src="images/logoBG.png" alt="logo" id="logo"><span>forty</span> <span>thieves</span></h1>
            <div id="olenmode"></div>
            <div id="statsgraph">
                <div id="infograph-container">
                    <div class="wedge" id="top"></div>
                    <div class="wedge" id="bottom"></div>
                    <img src="images/circleGraphic.png" alt="graphic" id="graphic">

                    <div class="wedge">
                        <svg width="100%" height="100%" viewBox="0 0 100 100">
                            <defs>
                                <path id="circlePath"
                                d="M 50,13
                                    a 37,37 0 1,1 0,74
                                    a 37,37 0 1,1 0,-74" />
                            </defs>
                            <g transform="rotate(-80,50,50)">
                                <text class="circle-text">
                                <textPath href="#circlePath" startOffset="0%">
                                    ave: 625.33 pts
                                </textPath>
                                </text>
                            </g>
                        </svg>
                        
                    </div>

                    <div class="wedge">
                        <svg width="100%" height="100%" viewBox="0 0 100 100">
                            <defs>
                                <!-- Clockwise path -->
                                <path id="innerCirclePath"
                                d="M 50,10
                                    a 40,40 0 1,0 0,80
                                    a 40,40 0 1,0 0,-80" />
                            </defs>
                            <g transform="rotate(-100,50,50)">
                                <text class="circle-text" style="dominant-baseline: middle;">
                                <textPath href="#innerCirclePath" startOffset="0%">
                                    win %: 22
                                </textPath>
                                </text>
                            </g>
                        </svg>
                    </div>
                </div>

            </div>
            

            <div id="foundation-container">
                <div id="f1" class="foundation"></div>
                <div id="f2" class="foundation"></div>
                <div id="f3" class="foundation"></div>
                <div id="f4" class="foundation"></div>
                <div id="f5" class="foundation"></div>
                <div id="f6" class="foundation"></div>
                <div id="f7" class="foundation"></div>
                <div id="f8" class="foundation"></div> 
            </div>
        
            <div id="tableau-container">
                <section id="s1"></section>
                <section id="s2"></section>
                <section id="s3"></section>
                <section id="s4"></section>
                <section id="s5"></section>
                <section id="s6"></section>
                <section id="s7"></section>
                <section id="s8"></section>
                <section id="s9"></section>
                <section id="s10"></section>
            </div>
            <div id="divider"></div>
            <div id="deck"></div>
            <div id="discard"></div>
            <div id="error-container">
                <p id="error-message" class="hide"></p>
            </div>
            <div id="score-container">
                <img src="images/logoBG.png" alt="decoration">
                <div>
                    <h2>score</h2>
                    <p id="score">0</p>
                    <p>points</p>
                </div>

            </div>
        </main>
        <!-- <img src="images/redthief.png" alt="ali-baba" id="ali-baba"> -->
    </div>
</body>
</html>
